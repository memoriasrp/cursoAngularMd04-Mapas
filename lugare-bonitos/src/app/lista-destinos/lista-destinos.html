<div class="container	content">
    <div class="row">
        <div class="col-md-6	offset-md-3">
            <span class="anchor" id="formLogin"></span>
            <!--	form	card	login	with	validation	feedback	-->
            <div class="card	card-outline-secondary">
                <div class="card-header">
                    <h3 class="mb-0">Whishlist</h3>
                </div>
                <div class="card-body">
                    <form>
                        <div class="form-group">
                            <label for="nombre">Nombre</label>
                            <input type="text" class="form-control" id="nombre" placeholder="Ingresar nombre..."
                                #nombre>

                        </div>
                        <div class="form-group">
                            <label for="imagenUrl">Imagen Url</label>
                            <input type="text" class="form-control" id="imagenUrl" value="https://picsum.photos/id/2"
                                placeholder=" like...https://picsum.photos/id/2" #url>
                        </div>
                        <button type="submit" class="btn btn-primary" (click)="guardar(nombre, url)">Guardar!</button>
                        @if (mensajeError) {
                        <div class="alert alert-danger mt-2">
                            {{ mensajeError }}
                        </div>
                        }

                    </form>
                </div>
            </div>
        </div>
    </div>

    <hr class="mb-5">

    <div class="row row-flex">
        @for (d of destinos; track d; let i=$index) {
        <app-destino-viaje [destino]="d" [position]="i+1" (clicked)="elegido($event)"></app-destino-viaje>
        }

    </div>
</div>
