<div class="container	content">
    <div class="row">
        <div class="col-md-6	offset-md-3">
            <span class="anchor" id="formLogin"></span>
            <!--	form	card	login	with	validation	feedback	-->
            <div class="card	card-outline-secondary">
                <div class="card-header">
                    <h3 class="mb-0">Whishlist</h3>
                </div>
                <div class="card-body">
                    <app-form-destino-viaje (onItemAdded)="agregado($event)"></app-form-destino-viaje>
                </div>
            </div>
        </div>
    </div>

    <hr class="mb-5">

    <div class="row row-flex">
        @for (d of destinos; track d; let i=$index) {
        <app-destino-viaje [destino]="d" [position]="i+1" (clicked)="elegido($event)"></app-destino-viaje>
        }

    </div>
    <hr class="mb-5">

    <div class="row row-flex">
        <h5>Actividades</h5>
        <ul>

        </ul>
        @for (u of update; track u) {
        <li>{{u}}</li>
        }

    </div>
</div>
