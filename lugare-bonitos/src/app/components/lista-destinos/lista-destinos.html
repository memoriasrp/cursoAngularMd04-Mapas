<div class="container	content">
    <div class="row">
        <div class="col-md-6	offset-md-3">
            <span class="anchor" id="formLogin"></span>
            <!--	form	card	login	with	validation	feedback	-->
            <div class="card	card-outline-secondary">
                <div class="card-header">
                    <h3 class="mb-0"><b [innerHTML]="'lista_deseos'| translate"></b></h3>
                </div>
                <div class="card-body">
                    <app-form-destino-viaje (onItemAdded)="agregado($event)"></app-form-destino-viaje>
                </div>
            </div>
        </div>
    </div>

    <hr class="mb-5">

    <div class="row row-flex">
        @for (d of destinos$ | async; track d.id; let i = $index) {
        <app-destino-viaje [destino]="d" [position]="i + 1" (onItemDeleted)="eliminarDestino($event)">
        </app-destino-viaje>

        }@empty {
        <p>No hay destinos guardados en el navegador.</p>
        }

    </div>
    <hr class="mb-5">

    <div class="row row-flex">
        <h5>Actividades</h5>
        <ul>

        </ul>
        @for (u of update; track $index) {
        <li>{{u}}</li>
        }

    </div>
</div>
