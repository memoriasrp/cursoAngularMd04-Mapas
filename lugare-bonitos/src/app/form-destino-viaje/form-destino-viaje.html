<form [formGroup]="fg" (ngSubmit)="guardar()">
    <div class="form-group">
        <label for="nombre">Nombre</label>
        <input type="text" class="form-control" id="nombre" placeholder="Ingresar nombre..." formControlName="nombre"
            [class.is-invalid]="fg.get('nombre')?.invalid && fg.get('nombre')?.touched">
        @if (fg.get('nombre')?.hasError('required') && fg.get('nombre')?.touched) {
        <small class="text-danger d-block">
            el nombre es obligatoria
        </small>
        }
    </div>

    <div class="form-group">
        <label for="url">Imagen URL</label>
        <input type="text" id="url" class="form-control" formControlName="url" placeholder="https://picsum.photos/id/2"
            [class.is-invalid]="fg.get('url')?.invalid && fg.get('url')?.touched">
        <!-- Sugerencia fija -->
        <small class="text-muted">
            Ejemplo: https://picsum.photos/id/10
        </small>

        <!-- Mensaje dinámico si está vacío -->
        @if (fg.get('url')?.hasError('required') && fg.get('url')?.touched) {
        <small class="text-danger d-block">
            La URL es obligatoria
        </small>
        }


    </div>

    @if(fg.valid){
    <button type="submit" class="btn btn-primary">Guardar!</button>
    }


    @if (mensajeError) {
    <div class="alert alert-danger mt-2">
        {{ mensajeError }}
    </div>
    }
</form>
